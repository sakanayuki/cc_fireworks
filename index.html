<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>花火</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
#renderCanvas {
  width: 100%;
  height: 100%;
  touch-action: none;
}
#launchBtn {
  position: fixed;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffb347, #ff6600);
  border: 3px solid #ff8800;
  box-shadow: 0 0 18px 4px rgba(255,120,0,0.6), 0 4px 16px rgba(0,0,0,0.5);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  z-index: 10;
  transition: box-shadow 0.1s;
}
#launchBtn:active {
  box-shadow: 0 0 32px 8px rgba(255,160,0,0.9), 0 4px 16px rgba(0,0,0,0.5);
}
#launchBtn.disabled {
  opacity: 0.4;
  cursor: not-allowed;
}
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<button id="launchBtn" aria-label="打ち上げ"></button>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script>
(function() {
  const canvas = document.getElementById('renderCanvas');
  const btn = document.getElementById('launchBtn');
  const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: false, stencil: false });

  // State
  let canLaunch = true;
  let burstTime = null;     // epoch ms when burst starts
  let burstEndTime = null;  // epoch ms when cooldown ends
  let lastBurstX = 0;
  let lastBurstY = 60;

  // ---- SCENE ----
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.08, 0.08, 0.10, 1);
  scene.gravity = new BABYLON.Vector3(0, 0, 0);

  // Orthographic 2D-style camera
  const camera = new BABYLON.ArcRotateCamera('cam', -Math.PI/2, Math.PI/2, 10, BABYLON.Vector3.Zero(), scene);
  camera.mode = BABYLON.Camera.ORTHOGRAPHIC_CAMERA;
  const setOrtho = () => {
    const h = engine.getRenderHeight();
    const w = engine.getRenderWidth();
    const aspect = w / h;
    camera.orthoTop = 100;
    camera.orthoBottom = -100;
    camera.orthoLeft = -100 * aspect;
    camera.orthoRight = 100 * aspect;
  };
  setOrtho();
  engine.onResizeObservable.add(setOrtho);

  // Lighting (minimal, we use emissive)
  const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0,1,0), scene);
  hemi.intensity = 0.1;

  // ---- STARS ----
  const STAR_COUNT = 180;
  const stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    const s = BABYLON.MeshBuilder.CreateSphere('star', { diameter: 0.18 + Math.random() * 0.32 }, scene);
    const mat = new BABYLON.StandardMaterial('sm' + i, scene);
    const bright = 0.7 + Math.random() * 0.3;
    mat.emissiveColor = new BABYLON.Color3(bright, bright, bright);
    mat.disableLighting = true;
    s.material = mat;
    s.position.x = (Math.random() - 0.5) * 190;
    s.position.y = (Math.random() * 0.8 + 0.1) * 200 - 100; // top 90%
    s.position.z = 2;
    const baseAlpha = 0.5 + Math.random() * 0.5;
    const speed = 0.5 + Math.random() * 1.5;
    const offset = Math.random() * Math.PI * 2;
    stars.push({ mesh: s, mat, baseAlpha, speed, offset });
  }

  // ---- HELPERS ----
  const WARM_COLORS = [
    [1.0, 0.2, 0.05],
    [1.0, 0.45, 0.0],
    [1.0, 0.75, 0.0],
    [1.0, 0.9,  0.1],
    [1.0, 0.3,  0.3],
    [1.0, 0.55, 0.15],
    [0.95, 0.15, 0.0],
    [1.0, 0.65, 0.0],
  ];
  const randColor = () => {
    const c = WARM_COLORS[Math.floor(Math.random() * WARM_COLORS.length)];
    return new BABYLON.Color3(c[0], c[1], c[2]);
  };
  const randColors = (n) => {
    const out = [];
    for (let i = 0; i < n; i++) out.push(randColor());
    return out;
  };

  // world Y coord of screen bottom / top
  const screenY = (frac) => camera.orthoBottom + (camera.orthoTop - camera.orthoBottom) * frac;
  const screenX = (frac) => camera.orthoLeft + (camera.orthoRight - camera.orthoLeft) * frac;

  // ---- AUDIO ----
  let audioCtx = null;
  const ensureAudio = () => {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  };

  const playLaunchSound = () => {
    try {
      ensureAudio();
      const dur = 1.0;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(120, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + dur);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + dur);
      osc.start(); osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  };

  const playBurstSound = (big) => {
    try {
      ensureAudio();
      const dur = big ? 0.5 : 0.35;
      const bufSize = audioCtx.sampleRate * dur;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bufSize, 1.5);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const gain = audioCtx.createGain();
      src.connect(gain); gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(big ? 0.4 : 0.25, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      src.start();
    } catch(e) {}
  };

  // ---- PARTICLES ----
  const activeParticles = [];

  function spawnParticle(x, y, vx, vy, color, life, size, gravity) {
    const mesh = BABYLON.MeshBuilder.CreateSphere('p', { diameter: size }, scene);
    const mat = new BABYLON.StandardMaterial('pm_' + Math.random(), scene);
    mat.emissiveColor = color.clone();
    mat.disableLighting = true;
    mesh.material = mat;
    mesh.position.x = x;
    mesh.position.y = y;
    mesh.position.z = 0;
    const p = { mesh, mat, vx, vy, life, maxLife: life, color, gravity: gravity || 0 };
    activeParticles.push(p);
    return p;
  }

  function disposeParticle(p) {
    p.mesh.dispose();
    p.mat.dispose();
  }

  // ---- LAUNCH ----
  const BURST_Y_MIN = 55; // world units from center
  const BURST_Y_MAX = 75;
  const LAUNCH_FROM_Y = () => screenY(0.22); // button area

  let rocketData = null; // { mesh, mat, x, y, vy, targetY, trailTimer }

  function launchFirework() {
    canLaunch = false;
    btn.classList.add('disabled');
    playLaunchSound();

    const launchX = (Math.random() - 0.5) * 20; // slight horizontal random
    const launchY = LAUNCH_FROM_Y();
    const targetY = BURST_Y_MIN + Math.random() * (BURST_Y_MAX - BURST_Y_MIN);
    const dy = targetY - launchY;
    const duration = 1.0; // seconds
    const vy = dy / duration;

    const mesh = BABYLON.MeshBuilder.CreateSphere('rocket', { diameter: 1.2 }, scene);
    const mat = new BABYLON.StandardMaterial('rmat', scene);
    mat.emissiveColor = new BABYLON.Color3(1, 0.5, 0);
    mat.disableLighting = true;
    mesh.material = mat;
    mesh.position.set(launchX, launchY, 0);

    rocketData = { mesh, mat, x: launchX, y: launchY, vy, targetY, trailTimer: 0, startTime: performance.now() };
  }

  // ---- BURST ----
  const BURST_PATTERNS = ['sphere', 'ring', 'star', 'willow'];

  function burst(x, y, big) {
    const pattern = BURST_PATTERNS[Math.floor(Math.random() * BURST_PATTERNS.length)];
    const baseCount = big ? 120 : 55;
    const baseRadius = big ? 3.0 : 17;
    const life = big ? 2.2 : 1.5;
    const colors = big ? randColors(3) : [randColor()];

    burstTime = performance.now();
    burstEndTime = burstTime + (big ? 3200 : 2200);
    lastBurstX = x;
    lastBurstY = y;

    playBurstSound(big);

    if (big) {
      // Screen flash
      scene.clearColor = new BABYLON.Color4(0.3, 0.15, 0.0, 1);
      setTimeout(() => { scene.clearColor = new BABYLON.Color4(0.08, 0.08, 0.10, 1); }, 80);
    }

    const spawnBurst = (cx, cy, count, radius, colorArr, lifeVal, ringOnly) => {
      for (let i = 0; i < count; i++) {
        let angle, speed;
        if (pattern === 'ring' || ringOnly) {
          angle = (i / count) * Math.PI * 2;
          speed = radius * (0.9 + Math.random() * 0.2);
        } else if (pattern === 'star') {
          const arm = Math.floor(i / (count / 6));
          angle = (arm / 6) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
          speed = radius * (0.6 + Math.random() * 0.6);
        } else if (pattern === 'willow') {
          angle = Math.random() * Math.PI * 2;
          speed = radius * (0.3 + Math.random() * 0.7);
        } else {
          angle = Math.random() * Math.PI * 2;
          speed = radius * (0.5 + Math.random() * 0.5);
        }
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        const col = colorArr[Math.floor(Math.random() * colorArr.length)];
        const size = big ? 0.7 + Math.random() * 0.5 : 0.45 + Math.random() * 0.35;
        spawnParticle(cx, cy, vx, vy, col, lifeVal * (0.7 + Math.random() * 0.6), size, -2.5);
      }
    };

    spawnBurst(x, y, baseCount, baseRadius, colors, life, false);

    if (big) {
      // Ring shockwave
      const ringColor = new BABYLON.Color3(1, 0.9, 0.5);
      spawnBurst(x, y, 60, baseRadius * 1.3, [ringColor], life * 0.6, true);

      // Second burst after delay
      setTimeout(() => {
        const c2 = randColors(2);
        spawnBurst(x, y, 80, baseRadius * 0.8, c2, life * 0.9, false);
        playBurstSound(false);
      }, 400);
    }
  }

  // ---- TRAIL ----
  function spawnTrail(x, y, color, big) {
    const size = big ? 0.55 : 0.38;
    const mesh = BABYLON.MeshBuilder.CreateSphere('tr', { diameter: size }, scene);
    const mat = new BABYLON.StandardMaterial('trm_' + Math.random(), scene);
    mat.emissiveColor = color.clone();
    mat.disableLighting = true;
    mesh.material = mat;
    mesh.position.set(x, y, 0);
    const life = 0.25 + Math.random() * 0.2;
    activeParticles.push({ mesh, mat, vx: 0, vy: 0, life, maxLife: life, color, gravity: 0, isTrail: true });
  }

  // ---- UPDATE LOOP ----
  let lastTime = performance.now();
  scene.registerBeforeRender(() => {
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    // Star twinkle
    stars.forEach(s => {
      const a = s.baseAlpha * (0.6 + 0.4 * Math.sin(now / 1000 * s.speed + s.offset));
      s.mat.emissiveColor.r = a;
      s.mat.emissiveColor.g = a;
      s.mat.emissiveColor.b = a;
    });

    // Rocket update
    if (rocketData) {
      const elapsed = (now - rocketData.startTime) / 1000;
      rocketData.y += rocketData.vy * dt;
      rocketData.mesh.position.y = rocketData.y;

      // Trail
      rocketData.trailTimer += dt;
      if (rocketData.trailTimer > 0.03) {
        rocketData.trailTimer = 0;
        spawnTrail(rocketData.x, rocketData.y, new BABYLON.Color3(1, 0.45, 0), false);
      }

      if (rocketData.y >= rocketData.targetY || elapsed >= 1.0) {
        const bx = rocketData.x;
        const by = rocketData.y;
        rocketData.mesh.dispose();
        rocketData.mat.dispose();
        rocketData = null;

        // 0.5s lag before burst
        setTimeout(() => {
          burst(bx, by, false);
        }, 500);
      }
    }

    // Particles update
    for (let i = activeParticles.length - 1; i >= 0; i--) {
      const p = activeParticles[i];
      p.life -= dt;
      if (p.life <= 0) {
        disposeParticle(p);
        activeParticles.splice(i, 1);
        continue;
      }
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.vy += p.gravity * dt;
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.y += p.vy * dt;

      const alpha = Math.max(0, p.life / p.maxLife);
      p.mat.emissiveColor = p.color.scale(alpha);
    }

    // Re-enable launch after cooldown
    if (!canLaunch && burstEndTime && now >= burstEndTime) {
      canLaunch = true;
      burstEndTime = null;
      burstTime = null;
      btn.classList.remove('disabled');
    }
  });

  // ---- BUTTON ----
  const handlePress = () => {
    if (!canLaunch) {
      // Check timing bonus
      if (burstTime !== null) {
        const delta = Math.abs(performance.now() - burstTime);
        if (delta <= 100) {
          burst(lastBurstX, lastBurstY, true);
        }
      }
      return;
    }
    launchFirework();
  };

  btn.addEventListener('pointerdown', handlePress);

  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
})();
</script>
</body>
</html>
